; ============================================================================
;  Tapete Interactivo Terapéutico — Configuración PlatformIO
; ----------------------------------------------------------------------------
;  Dos entornos:
;    - esp32dev : firmware real (framework Arduino sobre ESP32 DevKit V1).
;    - native   : compilación/tests de la lógica portable en el PC.
;
;  IMPORTANTE sobre los tests:
;  La fuente de verdad para correr los tests de C++ es `scripts/run_all_tests.sh`,
;  que compila la lógica portable de `lib/GameCore` con g++ + doctest (sin
;  dependencias externas, sin necesidad de instalar PlatformIO). El entorno
;  `native` de abajo queda definido por completitud y para quien tenga PlatformIO
;  instalado; no es el camino principal de validación.
; ============================================================================

[platformio]
default_envs = esp32dev

; ---------------------------------------------------------------------------
;  Firmware real para el ESP32 DevKit V1
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; La lógica de juego vive en lib/GameCore y PlatformIO la enlaza automáticamente.
; Único driver externo: el reproductor MP3 DFPlayer Mini.
lib_deps =
    dfrobot/DFRobotDFPlayerMini @ ^1.0.6
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1
build_unflags =
    -std=gnu++11

; ---------------------------------------------------------------------------
;  Modo calibración del umbral FSR: imprime las lecturas crudas del ADC por
;  serial (no corre el juego ni WiFi). Solo para calibrar UMBRAL_PISADA:
;    pio run -e esp32dev_calib -t upload   (luego monitor a 115200)
; ---------------------------------------------------------------------------
[env:esp32dev_calib]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DCALIBRACION

; ---------------------------------------------------------------------------
;  Entorno nativo (PC) — solo lógica portable, sin Arduino
; ---------------------------------------------------------------------------
[env:native]
platform = native
build_flags =
    -std=c++17
    -Ilib/GameCore
; Si se usa PlatformIO para los tests nativos, se emplea doctest.
; (El camino recomendado y soportado sin PlatformIO es scripts/run_all_tests.sh.)
test_framework = doctest
