 r="45.0" fill="#0077B6" fill-opacity="0.25" stroke="#0077B6" stroke-width="2"/><circle cx="220.0" cy="415.0" r="16.5" fill="#0077B6" fill-opacity="0.5" stroke="none" stroke-width="1"/><text x="220.0" y="421.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" fill="#1D3557" text-anchor="middle" font-weight="bold">4</text><text x="220.0" y="364.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="9" fill="#6B705C" text-anchor="middle" font-weight="normal">botón 4</text><line x1="370.0" y1="415.0" x2="370.0" y2="340.0" stroke="#6B705C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5 4"/><circle cx="370.0" cy="415.0" r="45.0" fill="#F77F00" fill-opacity="0.25" stroke="#F77F00" stroke-width="2"/><circle cx="370.0" cy="415.0" r="16.5" fill="#F77F00" fill-opacity="0.5" stroke="none" stroke-width="1"/><text x="370.0" y="421.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" fill="#1D3557" text-anchor="middle" font-weight="bold">5</text><text x="370.0" y="364.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="9" fill="#6B705C" text-anchor="middle" font-weight="normal">botón 5</text><line x1="520.0" y1="415.0" x2="370.0" y2="340.0" stroke="#6B705C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5 4"/><circle cx="520.0" cy="415.0" r="45.0" fill="#7B2CBF" fill-opacity="0.25" stroke="#7B2CBF" stroke-width="2"/><circle cx="520.0" cy="415.0" r="16.5" fill="#7B2CBF" fill-opacity="0.5" stroke="none" stroke-width="1"/><text x="520.0" y="421.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" fill="#1D3557" text-anchor="middle" font-weight="bold">6</text><text x="520.0" y="364.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="9" fill="#6B705C" text-anchor="middle" font-weight="normal">botón 6</text><text x="72.0" y="580.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#6B705C" text-anchor="start" font-weight="normal">Cada botón baja 4 hilos (FSR_alto, FSR_bajo, LED_ánodo, LED_cátodo) = 24 en total.</text><text x="72.0" y="596.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#6B705C" text-anchor="start" font-weight="normal">Recorridos ~25–30 cm → encadenar M-F + M-M soldado + termorretráctil. Bucle de servicio para abrir la tapa.</text><rect x="54.0" y="510.0" width="14.0" height="26.0" rx="3" fill="#0077B6" fill-opacity="1" stroke="none" stroke-width="1"/><text x="48.0" y="506.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10" fill="#0077B6" text-anchor="end" font-weight="bold">USB-C</text><text x="48.0" y="520.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="8.5" fill="#6B705C" text-anchor="end" font-weight="normal">(ranura en</text><text x="48.0" y="532.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="8.5" fill="#6B705C" text-anchor="end" font-weight="normal">la pared)</text><line x1="70.0" y1="562.0" x2="670.0" y2="562.0" stroke="#6B705C" stroke-width="1" stroke-linecap="round"/><text x="370.0" y="559.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#6B705C" text-anchor="middle" font-weight="bold">40 cm</text><line x1="682.0" y1="130.0" x2="682.0" y2="550.0" stroke="#6B705C" stroke-width="1" stroke-linecap="round"/><text x="686.0" y="340.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#6B705C" text-anchor="middle" font-weight="bold" transform="rotate(-90 686.0 340.0)">28 cm</text><text x="760.0" y="138.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" fill="#1D3557" text-anchor="start" font-weight="bold">CORTE LATERAL (alto 13 cm)</text><rect x="760.0" y="150.0" width="360.0" height="234.0" rx="0" fill="#BFC8D6" fill-opacity="0.18" stroke="#1D3557" stroke-width="2"/><rect x="760.0" y="374.0" width="360.0" height="10.0" rx="0" fill="#BFC8D6" fill-opacity="0.5" stroke="none" stroke-width="1"/><rect x="911.2" y="350.0" width="120.0" height="24.0" rx="3" fill="#EDEDE6" fill-opacity="1" stroke="#6B705C" stroke-width="1.5"/><rect x="951.2" y="334.0" width="44.0" height="16.0" rx="2" fill="#2B3A55" fill-opacity="1" stroke="none" stroke-width="1"/><text x="973.2" y="345.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ESP32</text><text x="971.2" y="382.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="9" fill="#6B705C" text-anchor="middle" font-weight="normal">protoboard (piso)</text><rect x="760.0" y="150.0" width="360.0" height="12.0" rx="0" fill="#9FB3C8" fill-opacity="0.7" stroke="none" stroke-width="1"/><text x="940.0" y="148.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10" fill="#1D3557" text-anchor="middle" font-weight="bold">tapa + gráfico</text><rect x="814.0" y="162.0" width="36.0" height="8.0" rx="0" fill="#F4A259" fill-opacity="0.7" stroke="none" stroke-width="1"/><circle cx="832.0" cy="162.0" r="4.0" fill="#5B5F62" fill-opacity="1" stroke="none" stroke-width="1"/><rect x="940.0" y="162.0" width="36.0" height="8.0" rx="0" fill="#F4A259" fill-opacity="0.7" stroke="none" stroke-width="1"/><circle cx="958.0" cy="162.0" r="4.0" fill="#5B5F62" fill-opacity="1" stroke="none" stroke-width="1"/><polyline points="971.2,350.0 940.0,320.0 932.8,290.0 893.6,260.0 886.4,230.0 847.2,200.0 840.0,170.0 832.0,172.0" fill="none" stroke="#6B705C" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><polyline points="971.2,350.0 961.0,320.0 974.8,290.0 956.6,260.0 970.4,230.0 952.2,200.0 966.0,170.0 958.0,172.0" fill="none" stroke="#6B705C" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><line x1="748.0" y1="150.0" x2="748.0" y2="384.0" stroke="#6B705C" stroke-width="1" stroke-linecap="round"/><text x="744.0" y="267.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#6B705C" text-anchor="middle" font-weight="bold" transform="rotate(-90 744.0 267.0)">13 cm</text><text x="760.0" y="406.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#6B705C" text-anchor="start" font-weight="normal">El protoboard va fijado al piso (cinta doble faz). Los 24 hilos suben a la tapa con bucle de servicio.</text><text x="740.0" y="458.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" fill="#1D3557" text-anchor="start" font-weight="bold">DETALLE DEL BOTÓN (corte del sándwich bajo la tapa)</text><rect x="740.0" y="480.0" width="360.0" height="16.0" rx="3" fill="#D8C3A5" fill-opacity="0.8" stroke="#1D3557" stroke-width="1"/><text x="1112.0" y="492.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#1D3557" text-anchor="start" font-weight="normal">Tapa-botón rígida (con el gráfico)</text><rect x="740.0" y="500.0" width="360.0" height="14.0" rx="3" fill="#CFE8EF" fill-opacity="0.8" stroke="#1D3557" stroke-width="1"/><text x="1112.0" y="511.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#1D3557" text-anchor="start" font-weight="normal">Tapa transparente (se presiona aquí)</text><rect x="740.0" y="518.0" width="360.0" height="22.0" rx="3" fill="#F4A259" fill-opacity="0.8" stroke="#1D3557" stroke-width="1"/><rect x="740.0" y="518.0" width="360.0" height="22.0" rx="0" fill="#FBFBF8" fill-opacity="1" stroke="none" stroke-width="1"/><rect x="740.0" y="518.0" width="150.0" height="22.0" rx="3" fill="#F4A259" fill-opacity="0.8" stroke="#1D3557" stroke-width="1"/><rect x="950.0" y="518.0" width="150.0" height="22.0" rx="3" fill="#F4A259" fill-opacity="0.8" stroke="#1D3557" stroke-width="1"/><rect x="904.0" y="520.0" width="32.0" height="18.0" rx="3" fill="#5B5F62" fill-opacity="1" stroke="none" stroke-width="1"/><text x="920.0" y="533.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">puck</text><text x="1112.0" y="533.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#1D3557" text-anchor="start" font-weight="normal">Anillo de espuma + puck al centro</text><rect x="740.0" y="544.0" width="360.0" height="14.0" rx="3" fill="#118AB2" fill-opacity="0.8" stroke="#1D3557" stroke-width="1"/><text x="1112.0" y="555.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#1D3557" text-anchor="start" font-weight="normal">FSR 402 (cara arriba)</text><rect x="740.0" y="562.0" width="360.0" height="18.0" rx="3" fill="#8D99AE" fill-opacity="0.8" stroke="#1D3557" stroke-width="1"/><text x="1112.0" y="575.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#1D3557" text-anchor="start" font-weight="normal">Base rígida (acrílico/PVC/MDF)</text><polyline points="920.0,464.0 920.0,476.0" fill="none" stroke="#E63946" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/><path d="M 914.0 474 L 926.0 474 L 920.0 484 Z" fill="#E63946" fill-opacity="1" stroke="none" stroke-width="1"/><text x="934.0" y="472.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10" fill="#E63946" text-anchor="start" font-weight="bold">presión</text><text x="740.0" y="600.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#6B705C" text-anchor="start" font-weight="normal">El puck concentra la fuerza en el domo del FSR; el anillo de espuma da retorno y evita disparos falsos;</text><text x="740.0" y="616.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#6B705C" text-anchor="start" font-weight="normal">la base rígida impide que el FSR flexe. Calibrar cfg::UMBRAL_PISADA viendo el Serial.</text><rect x="70.0" y="930.0" width="620.0" height="54.0" rx="8" fill="#FFFFFF" fill-opacity="1" stroke="#9FB3C8" stroke-width="1"/><text x="82.0" y="952.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#1D3557" text-anchor="start" font-weight="normal">Materiales del módulo: espuma EVA / cinta doble faz · puck = moneda/acrílico/tapa de botella ·</text><text x="82.0" y="970.0" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#1D3557" text-anchor="start" font-weight="normal">base = acrílico/PVC/MDF/baquela · adhesivo = silicona caliente o doble faz. Se ensambla con soldador.</text></svg>