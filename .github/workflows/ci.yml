name: CI

# Valida en cada push/PR: (1) lógica portable GameCore (C++ doctest + libgamecore.so
# + pytest) y (2) compilación del firmware ESP32 + smoke test en Wokwi.
# Fuente de verdad de los tests: scripts/run_all_tests.sh (no depende de PlatformIO).

on:
  push:
    branches: ['**']
    tags: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: GameCore (C++) + Python
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen   # PyQt6/matplotlib headless
      SDL_VIDEODRIVER: dummy       # pygame sin display
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Libs de sistema para PyQt6 offscreen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r simulator/requirements.txt -r dashboard/requirements.txt

      - name: Correr todos los tests (C++ doctest + .so + pytest)
        run: ./scripts/run_all_tests.sh

  firmware-wokwi:
    name: Firmware ESP32 + smoke Wokwi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Instalar PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compilar firmware (esp32dev)
        working-directory: firmware
        run: pio run -e esp32dev

      - name: Instalar Wokwi CLI
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Smoke test Wokwi (banner del serial)
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          if [ -z "$WOKWI_CLI_TOKEN" ]; then
            echo "::warning::WOKWI_CLI_TOKEN no configurado en Secrets; se omite el smoke Wokwi."
            exit 0
          fi
          wokwi-cli firmware --timeout 20000 --expect-text "Tapete Interactivo"

  windows-build:
    name: Windows — tests + empaquetado
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar MinGW (g++) y ponerlo en PATH
        shell: pwsh
        run: |
          choco install mingw --no-progress -y
          $cands = @(
            "C:\ProgramData\mingw64\mingw64\bin",
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin",
            "C:\mingw64\bin"
          )
          $bin = $cands | Where-Object { Test-Path (Join-Path $_ "g++.exe") } | Select-Object -First 1
          if (-not $bin) {
            $gpp = Get-Command g++ -ErrorAction SilentlyContinue
            if ($gpp) { $bin = Split-Path $gpp.Source }
          }
          if (-not $bin) { throw "no encontre g++ tras instalar mingw" }
          echo $bin >> $env:GITHUB_PATH

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r simulator/requirements.txt -r dashboard/requirements.txt pyinstaller==6.11.1

      - name: Correr la suite (mismo runner, via bash, PYBIN=python)
        shell: bash
        env:
          PYBIN: python
          QT_QPA_PLATFORM: offscreen
          SDL_VIDEODRIVER: dummy
        run: ./scripts/run_all_tests.sh

      - name: Construir libgamecore.dll
        run: python -c "import sys; sys.path.insert(0, 'simulator'); import core_bridge; print(core_bridge.construir_so(True))"

      - name: Construir el ejecutable (PyInstaller)
        run: pyinstaller --noconfirm packaging/tapete_dashboard.spec

      - name: Driver CP210x (offline en el ZIP; best-effort + enlace de respaldo)
        shell: bash
        run: |
          mkdir -p dist/TapeteDashboard/driver_cp210x
          printf '%s\n' \
            "Driver CP210x (Silicon Labs) para Windows." \
            "Si el tapete no aparece como puerto COM, instala este driver." \
            "Descarga oficial: https://www.silabs.com/developers/usb-to-uart-bridge-vcp-drivers" \
            > dist/TapeteDashboard/driver_cp210x/LEEME.txt
          curl -fL -o dist/TapeteDashboard/driver_cp210x/CP210x_Universal_Windows_Driver.zip \
            https://www.silabs.com/documents/public/software/CP210x_Universal_Windows_Driver.zip \
            || echo "::warning::No se pudo bajar el driver CP210x; el ZIP incluye el enlace en LEEME.txt."

      - name: Incluir la guia del medico
        shell: bash
        run: cp packaging/GUIA_MEDICO.md dist/TapeteDashboard/GUIA_MEDICO.md

      - name: Empaquetar ZIP
        shell: bash
        run: cd dist && 7z a -tzip TapeteDashboard-windows.zip TapeteDashboard >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: TapeteDashboard-windows
          path: dist/TapeteDashboard-windows.zip

  windows-smoke:
    name: Windows — smoke del .exe SIN deps de dev (gate de evidencia)
    needs: windows-build
    runs-on: windows-latest
    # Sin esto, un .exe que no termina consume las 6 h del runner (paso de 2026-07-09:
    # el job murio al limite duro). Falla en 5 min y deja el log.
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: TapeteDashboard-windows

      - name: Descomprimir
        shell: bash
        run: 7z x TapeteDashboard-windows.zip >/dev/null

      - name: Lanzar el .exe headless (sin pip install)
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
          QT_DEBUG_PLUGINS: '1'   # si Qt no encuentra su plugin de plataforma, lo dice aqui
        run: |
          set +e
          ./TapeteDashboard/TapeteDashboard.exe --smoke
          code=$?
          echo "--- exit code: $code ---"
          echo "--- smoke.log (el .exe no tiene consola: su traza va aqui) ---"
          cat smoke.log 2>/dev/null || cat TapeteDashboard/smoke.log 2>/dev/null || echo "(no se genero smoke.log: el .exe murio antes de arrancar Python)"
          exit $code

  windows-release:
    name: Windows — adjuntar el ZIP al Release (solo tags)
    needs: [windows-build, windows-smoke]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: TapeteDashboard-windows
      - uses: softprops/action-gh-release@v2
        with:
          files: TapeteDashboard-windows.zip
